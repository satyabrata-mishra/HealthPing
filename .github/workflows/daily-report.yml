name: HealthPing Daily Report

on:
  schedule:
    # Midnight UTC
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: healthping-daily-report
  cancel-in-progress: false

jobs:
  daily-report:
    name: Generate Daily Report
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Download Previous Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: healthping-health-reports
          path: report_outputs/

      - name: Generate Daily Report
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: |
          uv run python main.py --mode daily

      - name: Upload Daily Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthping-daily-report
          path: report_outputs/
          if-no-files-found: ignore
          retention-days: 30

      - name: Workflow Summary
        if: always()
        run: |
          echo "Daily report generated successfully." >> $GITHUB_STEP_SUMMARY