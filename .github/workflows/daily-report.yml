name: HealthPing Daily Report

on:
  schedule:
    # Run every day at midnight (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Download historical reports (if any)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: healthping-reports
          path: report_outputs/

      - name: Run Daily Summary
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: uv run python main.py --mode daily

      - name: Upload Daily Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthping-reports
          path: report_outputs/
          retention-days: 7
